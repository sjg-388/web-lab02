<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>실습 2-5</title>
  <style>
    table{
      border: 1px solid darkgray;
      border-collapse: collapse;
      caption-side:bottom;
      width:500px;
    }
    th{
      border: 1px solid darkgray;
      padding: 20px;
      background-color: rgb(173, 236, 236);
      text-align:left;
    }
    td{
      border: 1px solid darkgray;
      padding: 20px;
      text-align:center;
    }
    #flowerimage{
      background-image: url("flower.jpg");
      background-size: 100%;
      font-weight: bold;
    }
    caption{
      font-weight: bold;
      font-size: 1.2em;
    }
  </style>
</head>
<body>
  <table>
    <caption>2023 국민 독서실태</caption>
    <thead>
      <tr>
        <th>구분</th>
        <th>성인</th>
        <th>독서자</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <th>종이책</th>
        <td>6.1권</td>
        <td id="flowerimage">11.8권</td>
      </tr>
      <tr>
        <th>전자책</th>
        <td>1.2권</td>
        <td>7.1권</td>
      </tr>
      <tr>
        <th>오디오북</th>
        <td>0.2권</td>
        <td>5.5권</td>
      </tr>      
    </tbody>
  </table>
</body>
</html>
